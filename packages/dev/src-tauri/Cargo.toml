[package]
name = "forge-beta"
version = "0.1.25"
edition = "2021"

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
tauri-plugin-notification = "2"
tauri-plugin-updater = "2"
tauri-plugin-process = "2"
# ADR 0017 — desktop OAuth handoff via custom URL scheme.
# single-instance is REQUIRED so a running app receives the deep-link
# instead of spawning a fresh process that would drop the OAuth context.
tauri-plugin-deep-link = "2"
tauri-plugin-single-instance = { version = "2", features = ["deep-link"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tokio-tungstenite = { version = "0.24", features = ["native-tls"] }
futures-util = "0.3"
uuid = { version = "1", features = ["v4"] }
dirs-next = "2"
hostname = "0.4"
nix = { version = "0.31", features = ["signal", "process"] }
keyring = { version = "3", features = ["apple-native", "windows-native", "sync-secret-service"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
sha2 = "0.11"
hex = "0.4"
# Sentry is opt-in. The DSN is embedded at build time via the
# `FORGE_SENTRY_DSN_RUST` env var (read by `option_env!` in main.rs).
# Source builds without that env stay silent — no maintainer telemetry
# from contributor builds.
sentry = { version = "0.42", default-features = false, features = ["backtrace", "contexts", "panic", "reqwest", "rustls"] }

[build-dependencies]
tauri-build = { version = "2", features = [] }
