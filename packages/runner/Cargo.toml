[workspace]
resolver = "2"
members = ["crates/forge-runner-core", "crates/forge-runner"]

# Version is kept in lockstep with the monorepo (one version across
# web/core/dev/runner). Bumped by .claude/skills/forge-cut-release.
[workspace.package]
version = "0.2.11"
edition = "2021"
license = "MIT"

[workspace.dependencies]
# Used now (M0)
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"
thiserror = "2"
dirs-next = "2"
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
clap = { version = "4", features = ["derive"] }
anyhow = "1"
which = "6"

# Declared ahead for M1+ (not referenced by any crate yet — pulled in lazily)
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
tokio-tungstenite = "0.29"
futures-util = "0.3"
keyring = { version = "3", features = ["apple-native", "windows-native", "sync-secret-service"] }
uuid = { version = "1", features = ["v4"] }
hostname = "0.4"
sha2 = "0.10"
hex = "0.4"
base64 = "0.22"
# ISS-305 — open the browser to the /pair approval URL during `forge-runner login`.
webbrowser = "1"

# Lightweight release: single small static-ish binary.
[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "abort"
