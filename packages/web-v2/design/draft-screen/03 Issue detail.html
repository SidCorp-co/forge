document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

: url(\"af56e536-9f15-46a0-b9d4-48fa4c3d8cb3\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"4515fc24-2f4f-460c-8ec9-f8545c8a24bf\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   FORGE — Project Overview (dark terminal)\n   Warm near-black · flame action accent · mono structure.\n   Shares the visual language of the dark landing direction.\n   ============================================================ */\n:root{\n  --font-sans:'Hanken Grotesk',ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif;\n  --font-mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;\n\n  --bg:#0B0B0C;\n  --bg-sunken:#08080A;\n  --rail:#0E0D0F;\n  --surface:#141315;\n  --surface-2:#1A191C;\n  --surface-3:#211F23;\n\n  --border:#262329;\n  --border-subtle:#1B1A1D;\n  --border-strong:#36333A;\n\n  --fg:#ECEAE6;\n  --fg-muted:#908B85;\n  --fg-subtle:#67635E;\n  --fg-faint:#46433E;\n\n  --flame:#F15A2B;\n  --flame-600:#DC4A1D;\n  --flame-tint:rgba(241,90,43,.12);\n  --flame-line:rgba(241,90,43,.30);\n\n  --cobalt:#6E92F0;\n  --amber:#E8920C;\n  --green:#2DB37C;\n  --violet:#A98BE6;\n  --teal:#3FB6D6;\n  --red:#E0584E;\n\n  --st-triage:#A98BE6;\n  --st-clarify:#6E92F0;\n  --st-plan:#3FB6D6;\n  --st-code:#F15A2B;\n  --st-review:#E8920C;\n  --st-test:#2DB37C;\n  --st-release:#8E8A84;\n\n  /* tint-on-surface text (light tints, tuned for the dark UI) */\n  --tt-flame:#F7A98C;\n  --tt-cobalt:#9DB6F5;\n  --tt-amber:#F0B45A;\n  --tt-red:#EC8079;\n  --tt-green:#5FD0A0;\n\n  --rail-w:236px;\n  --topbar-h:56px;\n  --r-sm:6px;--r-md:9px;--r-lg:13px;\n  --ease:cubic-bezier(.22,1,.36,1);\n}\n\n*{box-sizing:border-box;}\nhtml,body{height:100%;}\nbody{\n  margin:0;background:var(--bg);color:var(--fg);\n  font-family:var(--font-sans);font-size:14px;line-height:1.5;\n  -webkit-font-smoothing:antialiased;\n}\n::selection{background:var(--flame-tint);color:#fff;}\n.mono{font-family:var(--font-mono);}\na.nav-item,a.proj-switch,a.btn-primary{text-decoration:none;}\na.nav-item{color:var(--fg-muted);}\n\n/* scrollbars */\n*::-webkit-scrollbar{width:10px;height:10px;}\n*::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:99px;border:3px solid var(--bg);}\n*::-webkit-scrollbar-thumb:hover{background:var(--border-strong);}\n\n/* =========================================================\n   APP GRID\n   ========================================================= */\n.app{display:grid;grid-template-columns:var(--rail-w) 1fr;height:100vh;overflow:hidden;}\n\n/* ---- NAV RAIL ---- */\n.rail{\n  background:var(--rail);border-right:1px solid var(--border-subtle);\n  display:flex;flex-direction:column;padding:14px 12px;gap:4px;overflow-y:auto;\n}\n.rail-brand{display:flex;align-items:center;gap:9px;padding:4px 8px 14px;}\n.rail-brand img{width:24px;height:24px;}\n.rail-brand b{font-family:var(--font-mono);font-weight:700;font-size:14px;letter-spacing:.16em;text-transform:uppercase;}\n\n.proj-switch{\n  display:flex;align-items:center;gap:9px;width:100%;\n  padding:8px 9px;margin-bottom:10px;cursor:pointer;\n  background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);\n  color:var(--fg);font-family:var(--font-sans);text-align:left;\n}\n.proj-switch:hover{background:var(--surface-2);}\n.proj-mark{width:22px;height:22px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;\n  font-family:var(--font-mono);font-size:9.5px;font-weight:700;flex:none;\n  background:rgba(241,90,43,.16);color:var(--tt-flame);border:1px solid var(--flame-line);}\n.proj-switch .nm{font-size:13.5px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}\n.proj-switch .cv{color:var(--fg-subtle);flex:none;}\n\n.nav-label{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;\n  color:var(--fg-faint);font-weight:600;padding:0 10px;margin:12px 0 6px;}\n.nav-item{\n  display:flex;align-items:center;gap:11px;width:100%;\n  padding:7px 10px;margin-bottom:1px;border-radius:var(--r-sm);\n  border:none;background:transparent;cursor:pointer;\n  font-family:var(--font-sans);font-size:13.5px;font-weight:500;color:var(--fg-muted);\n  transition:background .12s var(--ease),color .12s var(--ease);\n}\n.nav-item svg{color:var(--fg-subtle);flex:none;}\n.nav-item:hover{background:var(--surface);color:var(--fg);}\n.nav-item .sp{flex:1;text-align:left;}\n.nav-item .bdg{font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle);}\n.nav-item.on{background:var(--flame-tint);color:#fff;font-weight:600;}\n.nav-item.on svg{color:var(--flame);}\n.nav-item.on .bdg{color:var(--flame);}\n.nav-dot{width:6px;height:6px;border-radius:99px;background:var(--green);flex:none;margin-left:auto;}\n\n.rail-foot{margin-top:auto;padding-top:12px;border-top:1px solid var(--border-subtle);}\n.rail-user{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:var(--r-sm);cursor:pointer;}\n.rail-user:hover{background:var(--surface);}\n.rail-user .av{width:26px;height:26px;border-radius:99px;background:linear-gradient(135deg,#6E92F0,#3FB6D6);\n  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#0B0B0C;font-family:var(--font-mono);}\n.rail-user .who{font-size:13px;font-weight:600;}\n.rail-user .who span{display:block;font-size:11px;font-weight:400;color:var(--fg-subtle);font-family:var(--font-mono);}\n\n/* =========================================================\n   MAIN COLUMN\n   ========================================================= */\n.main{display:flex;flex-direction:column;min-width:0;overflow:hidden;}\n\n.topbar{\n  height:var(--topbar-h);flex:none;display:flex;align-items:center;gap:14px;\n  padding:0 26px;border-bottom:1px solid var(--border-subtle);\n  background:rgba(11,11,12,.7);backdrop-filter:blur(10px);\n}\n.crumb{display:flex;align-items:center;gap:9px;font-family:var(--font-mono);font-size:12.5px;color:var(--fg-subtle);flex:none;white-space:nowrap;}\n.crumb a{color:var(--fg-subtle);white-space:nowrap;}\n.crumb a:hover{color:var(--fg);}\n.crumb .sep{color:var(--fg-faint);}\n.crumb .cur{color:var(--fg);}\n.topbar .grow{flex:1;}\n.search{\n  display:flex;align-items:center;gap:8px;width:240px;flex:none;\n  padding:7px 11px;background:var(--bg-sunken);border:1px solid var(--border);border-radius:var(--r-md);\n  color:var(--fg-subtle);font-family:var(--font-mono);font-size:12px;cursor:text;\n}\n.search > span:not(.kbd){flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}\n.search .kbd{margin-left:auto;flex:none;font-size:10px;border:1px solid var(--border);border-radius:4px;padding:1px 5px;}\n.icon-btn{width:34px;height:34px;border-radius:var(--r-md);border:1px solid var(--border);background:var(--surface);\n  display:flex;align-items:center;justify-content:center;color:var(--fg-muted);cursor:pointer;position:relative;}\n.icon-btn:hover{background:var(--surface-2);color:var(--fg);}\n.icon-btn .dot{position:absolute;top:7px;right:8px;width:7px;height:7px;border-radius:99px;background:var(--flame);border:2px solid var(--surface);}\n.btn-primary{\n  display:inline-flex;align-items:center;gap:7px;padding:8px 13px;border-radius:var(--r-md);\n  background:var(--flame);border:1px solid var(--flame);color:#fff;cursor:pointer;\n  font-family:var(--font-mono);font-size:12px;font-weight:600;letter-spacing:.02em;white-space:nowrap;\n}\n.btn-primary:hover{background:var(--flame-600);}\n\n.scroll{flex:1;overflow-y:auto;}\n.canvas{max-width:1720px;margin:0 auto;padding:30px 40px 64px;}\n\n/* ---- project header ---- */\n.phead{display:flex;align-items:center;gap:14px;margin-bottom:18px;}\n.phead .pm{width:38px;height:38px;border-radius:var(--r-md);font-size:13px;}\n.phead h1{font-family:var(--font-sans);font-weight:800;font-size:22px;letter-spacing:-.02em;margin:0;display:flex;align-items:center;gap:11px;}\n.phead .repo{font-family:var(--font-mono);font-size:12px;color:var(--fg-subtle);margin:3px 0 0;}\n.phead .right{margin-left:auto;display:flex;align-items:center;gap:10px;}\n\n.health-chip{display:inline-flex;align-items:center;gap:7px;padding:5px 11px;border-radius:99px;\n  font-family:var(--font-mono);font-size:11.5px;font-weight:600;letter-spacing:.02em;}\n.health-chip .d{width:7px;height:7px;border-radius:99px;}\n.health-chip.attention{background:rgba(232,146,12,.12);color:var(--tt-amber);border:1px solid rgba(232,146,12,.3);}\n.health-chip.attention .d{background:var(--amber);}\n.health-chip.healthy{background:rgba(45,179,124,.12);color:var(--tt-green);border:1px solid rgba(45,179,124,.3);}\n.health-chip.healthy .d{background:var(--green);}\n\n/* ---- stat strip ---- */\n.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border-subtle);\n  border:1px solid var(--border-subtle);border-radius:var(--r-lg);overflow:hidden;margin-bottom:22px;}\n.stat{background:var(--surface);padding:16px 18px;}\n.stat .k{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-subtle);margin-bottom:9px;display:flex;align-items:center;gap:6px;}\n.stat .v{font-family:var(--font-mono);font-weight:700;font-size:24px;letter-spacing:-.02em;line-height:1;}\n.stat .v em{font-style:normal;color:var(--flame);}\n.stat .sub{font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle);margin-top:7px;}\n.stat .v.flame{color:var(--flame);}\n.stat .v.amber{color:var(--amber);}\n.stat .v.red{color:var(--red);}\n.stat .v.green{color:var(--green);}\n\n/* =========================================================\n   CONTENT GRID\n   ========================================================= */\n.grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(340px,420px);gap:22px;align-items:start;}\n.col{display:flex;flex-direction:column;gap:22px;min-width:0;}\n\n.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;}\n.panel-head{display:flex;align-items:center;gap:10px;padding:15px 18px 13px;border-bottom:1px solid var(--border-subtle);}\n.panel-head h2{font-family:var(--font-sans);font-weight:700;font-size:15px;letter-spacing:-.01em;margin:0;white-space:nowrap;}\n.panel-head .ct{font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle);background:var(--surface-2);\n  border:1px solid var(--border);border-radius:99px;padding:2px 8px;white-space:nowrap;}\n.panel-head .more{margin-left:auto;font-family:var(--font-mono);font-size:11.5px;color:var(--fg-subtle);cursor:pointer;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;flex:none;}\n.panel-head .more:hover{color:var(--fg);}\n.panel-head .lead-ic{width:26px;height:26px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;flex:none;}\n\n/* ---- NEEDS ATTENTION (lead) ---- */\n.attn{border-color:var(--flame-line);}\n.attn .panel-head{background:linear-gradient(180deg,rgba(241,90,43,.08),transparent);}\n.attn .lead-ic{background:var(--flame-tint);color:var(--flame);border:1px solid var(--flame-line);}\n.attn-row{display:flex;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid var(--border-subtle);cursor:pointer;transition:background .12s var(--ease);}\n.attn-row:last-child{border-bottom:none;}\n.attn-row:hover{background:var(--surface-2);}\n.attn-flag{width:32px;height:32px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;flex:none;}\n.attn-flag.blocked{background:rgba(224,88,78,.13);color:var(--red);border:1px solid rgba(224,88,78,.3);}\n.attn-flag.failed{background:rgba(224,88,78,.13);color:var(--red);border:1px solid rgba(224,88,78,.3);}\n.attn-flag.changes{background:rgba(232,146,12,.13);color:var(--amber);border:1px solid rgba(232,146,12,.3);}\n.attn-flag.waiting{background:rgba(110,146,240,.13);color:var(--cobalt);border:1px solid rgba(110,146,240,.3);}\n.attn-main{flex:1;min-width:0;}\n.attn-main .l1{display:flex;align-items:baseline;gap:9px;min-width:0;}\n.attn-main .id{font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--flame);white-space:nowrap;flex:none;}\n.attn-main .ttl{font-size:13.5px;font-weight:500;min-width:0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-wrap:pretty;}\n.attn-main .why{font-family:var(--font-mono);font-size:11.5px;color:var(--fg-muted);margin-top:4px;}\n.attn-main .why b{color:var(--tt-amber);font-weight:600;}\n.attn-main .why b.red{color:var(--tt-red);}\n.attn-main .why .ptag{vertical-align:middle;margin-right:3px;transform:translateY(-1px);}\n.attn-act{font-family:var(--font-mono);font-size:11.5px;font-weight:600;color:var(--fg);background:var(--surface-3);\n  border:1px solid var(--border-strong);border-radius:var(--r-sm);padding:6px 11px;cursor:pointer;white-space:nowrap;flex:none;}\n.attn-act:hover{border-color:var(--fg-subtle);}\n.attn-act.flame{background:var(--flame);border-color:var(--flame);color:#fff;}\n.attn-act.flame:hover{background:var(--flame-600);}\n.attn-meta{font-family:var(--font-mono);font-size:11px;color:var(--fg-faint);flex:none;min-width:46px;text-align:right;}\n\n/* ---- LIVE RUNS tracker ---- */\n.run{padding:15px 18px;border-bottom:1px solid var(--border-subtle);}\n.run:last-child{border-bottom:none;}\n.run-top{display:flex;align-items:center;gap:10px;margin-bottom:11px;}\n.run-top .id{font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--flame);white-space:nowrap;flex:none;}\n.run-top .ttl{font-size:13px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}\n.run-top .live{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;color:var(--green);flex:none;}\n.run-top .live .d{width:6px;height:6px;border-radius:99px;background:var(--green);}\n.run-top .cost{font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle);flex:none;}\n/* 7-segment stage rail */\n.srail{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}\n.seg{display:flex;flex-direction:column;gap:5px;}\n.seg .track{height:4px;border-radius:3px;background:var(--bg-sunken);overflow:hidden;}\n.seg .track > i{display:block;height:100%;border-radius:3px;width:0;background:var(--flame);transition:width .4s var(--ease);}\n.seg .lbl{font-family:var(--font-mono);font-size:9.5px;color:var(--fg-faint);letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}\n.seg.done .lbl{color:var(--fg-subtle);}\n.seg.active .lbl{color:var(--flame);font-weight:600;}\n.run-foot{display:flex;align-items:center;gap:8px;margin-top:9px;font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle);}\n.run-foot .now{color:var(--fg-muted);}\n.run-foot .now b{color:var(--flame);font-weight:600;}\n.run-foot .dev{margin-left:auto;color:var(--fg-faint);}\n\n/* ---- OPEN BY STATUS ---- */\n.status-bar{display:flex;height:10px;border-radius:99px;overflow:hidden;margin:4px 0 16px;gap:2px;background:transparent;}\n.status-bar > span{height:100%;}\n.legend{display:grid;grid-template-columns:repeat(2,1fr);gap:10px 22px;}\n.leg{display:flex;align-items:center;gap:9px;font-family:var(--font-mono);font-size:12px;}\n.leg .d{width:9px;height:9px;border-radius:3px;flex:none;}\n.leg .nm{color:var(--fg-muted);flex:1;}\n.leg .n{color:var(--fg);font-weight:600;}\n\n/* ---- side rail panels ---- */\n.kv{padding:14px 18px;}\n.cost-big{font-family:var(--font-mono);font-weight:700;font-size:32px;letter-spacing:-.02em;line-height:1;}\n.cost-big em{font-style:normal;color:var(--flame);}\n.cost-sub{font-family:var(--font-mono);font-size:11.5px;color:var(--fg-subtle);margin-top:8px;}\n.cost-spark{display:flex;align-items:flex-end;gap:3px;height:38px;margin-top:16px;}\n.cost-spark > i{flex:1;background:var(--surface-3);border-radius:2px 2px 0 0;min-height:3px;transition:background .15s;}\n.cost-spark > i.hi{background:var(--flame);}\n.cost-spark > i:hover{background:var(--flame-600);}\n.cost-by{margin-top:16px;display:flex;flex-direction:column;gap:9px;}\n.cost-line{display:flex;align-items:center;gap:9px;font-family:var(--font-mono);font-size:11.5px;}\n.cost-line .d{width:8px;height:8px;border-radius:2px;flex:none;}\n.cost-line .nm{color:var(--fg-muted);flex:1;}\n.cost-line .v{color:var(--fg);}\n\n.dev-row{display:flex;align-items:center;gap:11px;padding:12px 18px;border-bottom:1px solid var(--border-subtle);}\n.dev-row:last-child{border-bottom:none;}\n.dev-stat{width:8px;height:8px;border-radius:99px;flex:none;}\n.dev-stat.online{background:var(--green);box-shadow:0 0 0 3px rgba(45,179,124,.15);}\n.dev-stat.offline{background:var(--fg-faint);}\n.dev-info{flex:1;min-width:0;}\n.dev-info .nm{font-family:var(--font-mono);font-size:12.5px;font-weight:600;color:var(--fg);}\n.dev-info .meta{font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}\n.dev-info .meta .busy{color:var(--flame);}\n.dev-quota{font-family:var(--font-mono);font-size:11px;color:var(--fg-muted);flex:none;text-align:right;}\n.dev-quota .bar{width:46px;height:4px;border-radius:3px;background:var(--bg-sunken);overflow:hidden;margin-top:5px;}\n.dev-quota .bar > i{display:block;height:100%;border-radius:3px;background:var(--cobalt);}\n\n.sched-row{display:flex;align-items:center;gap:11px;padding:12px 18px;border-bottom:1px solid var(--border-subtle);}\n.sched-row:last-child{border-bottom:none;}\n.sched-ic{width:30px;height:30px;border-radius:var(--r-sm);background:var(--surface-2);border:1px solid var(--border);\n  display:flex;align-items:center;justify-content:center;color:var(--fg-subtle);flex:none;}\n.sched-info{flex:1;min-width:0;}\n.sched-info .nm{font-size:12.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}\n.sched-info .cad{font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle);margin-top:2px;}\n.sched-next{font-family:var(--font-mono);font-size:11px;color:var(--fg-muted);flex:none;text-align:right;}\n.sched-next .last{display:block;font-size:10px;margin-top:3px;}\n.sched-next .last.passed{color:var(--green);}\n.sched-next .last.failed{color:var(--red);}\n.sched-next .last.paused{color:var(--fg-faint);}\n.sched-row.off{opacity:.55;}\n\n.pulse{animation:pulse 1.6s var(--ease) infinite;}\n@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}\n\n@media(max-width:1080px){\n  .grid{grid-template-columns:1fr;}\n  .stats{grid-template-columns:repeat(3,1fr);}\n}\n@media(max-width:760px){\n  .app{grid-template-columns:1fr;}\n  .rail{display:none;}\n  .stats{grid-template-columns:repeat(2,1fr);}\n}\n@media(prefers-reduced-motion:reduce){.pulse{animation:none;}}\n\n/* ============================================================\n   LIGHT THEME — warm paper. Activate via html[data-theme=\"light\"].\n   The canvas passes ?theme=light to each screen; a head bootstrap\n   sets the attribute before CSS paints (no flash).\n   Neutrals flip through the token ramp; flame & status accents stay,\n   their tint-on-dark TEXT (--tt-*) darkens for paper contrast.\n   ============================================================ */\nhtml[data-theme=\"light\"]{\n  --bg:#FBFAF8;\n  --bg-sunken:#F1EDE6;\n  --rail:#F4F1EB;\n  --surface:#FFFFFF;\n  --surface-2:#F6F3EE;\n  --surface-3:#EDE9E1;\n\n  --border:#E4E0D8;\n  --border-subtle:#EDEAE3;\n  --border-strong:#CFC9BE;\n\n  --fg:#181B22;\n  --fg-muted:#5A616E;\n  --fg-subtle:#838A96;\n  --fg-faint:#A7ADB7;\n\n  --flame-tint:rgba(241,90,43,.10);\n  --flame-line:rgba(241,90,43,.26);\n\n  /* darkened tint text so accents read on white */\n  --tt-flame:#CF4A1D;\n  --tt-cobalt:#3F6FE0;\n  --tt-amber:#A56A07;\n  --tt-red:#CB4339;\n  --tt-green:#138155;\n}\nhtml[data-theme=\"light\"] body{background:var(--bg);}\nhtml[data-theme=\"light\"] ::selection{background:rgba(241,90,43,.16);color:var(--fg);}\n\n/* translucent topbar sits over paper, not near-black */\nhtml[data-theme=\"light\"] .topbar{background:rgba(251,250,248,.78);}\n\n/* active nav item: flame text on the light tint (white was invisible) */\nhtml[data-theme=\"light\"] .nav-item.on{color:#B23A12;}\n\n/* softer scrollbar on paper */\nhtml[data-theme=\"light\"] *::-webkit-scrollbar-thumb{background:var(--border-strong);}\nhtml[data-theme=\"light\"] *::-webkit-scrollbar-thumb:hover{background:var(--fg-faint);}\n\n/* \"needs attention\" emphasis used raw light tints */\nhtml[data-theme=\"light\"] .attn-main .why b{color:var(--tt-amber);}\nhtml[data-theme=\"light\"] .attn-main .why b.red{color:var(--tt-red);}\n\n/* tiny avatar/dot glyphs print dark ink on a colored chip — keep them\n   dark in both themes (they already use #0B0B0C, fine on light too) */\n<\u002Fstyle>\n<style>/* ============================================================\n   FORGE — screen styles: Board · Sessions · Session thread\n   Builds on overview.css tokens (dark terminal).\n   ============================================================ */\n\n/* page title block reused across screens */\n.screen-head{display:flex;align-items:flex-start;gap:16px;margin-bottom:16px;}\n.screen-head h1{font-family:var(--font-sans);font-weight:800;font-size:21px;letter-spacing:-.02em;margin:0;display:flex;align-items:center;gap:11px;}\n.screen-head .sub{font-family:var(--font-mono);font-size:12px;color:var(--fg-subtle);margin:4px 0 0;}\n.screen-head .right{margin-left:auto;display:flex;align-items:center;gap:10px;}\n.seg-toggle{display:flex;background:var(--bg-sunken);border:1px solid var(--border);border-radius:var(--r-md);padding:3px;gap:2px;}\n.seg-toggle button{font-family:var(--font-mono);font-size:11.5px;font-weight:500;color:var(--fg-muted);background:transparent;border:none;\n  padding:6px 12px;border-radius:var(--r-sm);cursor:pointer;white-space:nowrap;}\n.seg-toggle button.on{background:var(--surface-2);color:var(--fg);box-shadow:0 1px 0 rgba(0,0,0,.3);}\n.ghost-btn{display:inline-flex;align-items:center;gap:7px;padding:8px 13px;border-radius:var(--r-md);\n  background:var(--surface);border:1px solid var(--border);color:var(--fg-muted);cursor:pointer;\n  font-family:var(--font-mono);font-size:12px;white-space:nowrap;text-decoration:none;}\n.ghost-btn:hover{background:var(--surface-2);color:var(--fg);}\n\n/* =========================================================\n   BOARD — 7 stage columns\n   ========================================================= */\n.board{display:flex;gap:14px;align-items:flex-start;overflow-x:auto;padding-bottom:10px;}\n.bcol{flex:1 1 0;min-width:228px;display:flex;flex-direction:column;}\n.bcol-head{display:flex;align-items:center;gap:9px;padding:8px 4px 12px;position:sticky;top:0;}\n.bcol-head .sd{width:9px;height:9px;border-radius:99px;flex:none;}\n.bcol-head .nm{font-family:var(--font-mono);font-size:12px;font-weight:600;letter-spacing:.02em;color:var(--fg);text-transform:lowercase;}\n.bcol-head .ct{font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle);background:var(--surface);\n  border:1px solid var(--border);border-radius:99px;padding:1px 8px;}\n.bcol-head .add{margin-left:auto;color:var(--fg-faint);cursor:pointer;}\n.bcol-head .add:hover{color:var(--fg-muted);}\n.bcol-body{display:flex;flex-direction:column;gap:10px;min-height:60px;}\n.bcol-body.empty{border:1px dashed var(--border);border-radius:var(--r-md);padding:18px;text-align:center;\n  font-family:var(--font-mono);font-size:11px;color:var(--fg-faint);}\n\n.bcard{display:block;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);\n  padding:13px 13px 11px;cursor:pointer;text-decoration:none;color:inherit;transition:border-color .12s var(--ease),transform .12s var(--ease);}\n.bcard:hover{border-color:var(--border-strong);transform:translateY(-1px);}\n.bcard .top{display:flex;align-items:center;gap:8px;margin-bottom:9px;}\n.bcard .id{font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--flame);white-space:nowrap;flex:none;}\n.bcard .pill{margin-left:auto;font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:.03em;\n  text-transform:uppercase;padding:2px 7px;border-radius:99px;white-space:nowrap;}\n.pill.running{background:rgba(241,90,43,.13);color:var(--tt-flame);border:1px solid var(--flame-line);}\n.pill.queued{background:rgba(110,146,240,.12);color:var(--tt-cobalt);border:1px solid rgba(110,146,240,.28);}\n.pill.review{background:rgba(232,146,12,.12);color:var(--tt-amber);border:1px solid rgba(232,146,12,.28);}\n.pill.failed,.pill.blocked{background:rgba(224,88,78,.13);color:var(--tt-red);border:1px solid rgba(224,88,78,.3);}\n.pill.done{background:rgba(45,179,124,.12);color:var(--tt-green);border:1px solid rgba(45,179,124,.28);}\n.bcard .ttl{font-size:13px;font-weight:500;line-height:1.4;color:var(--fg);margin-bottom:11px;text-wrap:pretty;}\n.bcard .labels{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:11px;}\n.bcard .lab{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);background:var(--surface-2);\n  border:1px solid var(--border);border-radius:4px;padding:1px 6px;}\n.bcard .foot{display:flex;align-items:center;gap:9px;}\n.bcard .prog{flex:1;height:4px;border-radius:3px;background:var(--bg-sunken);overflow:hidden;display:flex;gap:2px;}\n.bcard .prog > i{height:100%;border-radius:1px;}\n.bcard .cost{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-subtle);}\n.bcard .av{width:20px;height:20px;border-radius:99px;display:flex;align-items:center;justify-content:center;\n  font-family:var(--font-mono);font-size:9px;font-weight:700;color:#0B0B0C;flex:none;}\n.av.cobalt{background:linear-gradient(135deg,#6E92F0,#3FB6D6);}\n.av.green{background:linear-gradient(135deg,#2DB37C,#3FB6D6);}\n.av.flame{background:linear-gradient(135deg,#F15A2B,#E8920C);}\n.bcard.live .id::after{content:\"\";display:inline-block;width:5px;height:5px;border-radius:99px;background:var(--green);margin-left:6px;vertical-align:middle;}\n\n/* issues — LIST view */\n.itable{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;}\n.ihead,.irow{display:grid;grid-template-columns:84px minmax(0,1fr) 116px 104px 58px;gap:14px;align-items:center;padding:12px 18px;}\n.ihead{border-bottom:1px solid var(--border-subtle);font-family:var(--font-mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-subtle);}\n.irow{border-bottom:1px solid var(--border-subtle);cursor:pointer;text-decoration:none;color:inherit;transition:background .12s var(--ease);}\n.irow:last-child{border-bottom:none;}\n.irow:hover{background:var(--surface-2);}\n.irow .iid{font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--flame);white-space:nowrap;}\n.irow .it{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}\n.istage{display:inline-flex;align-items:center;gap:7px;font-family:var(--font-mono);font-size:11.5px;color:var(--fg-muted);white-space:nowrap;}\n.istage .d{width:8px;height:8px;border-radius:99px;flex:none;}\n.irow .icost{font-family:var(--font-mono);font-size:12px;color:var(--fg-muted);text-align:right;white-space:nowrap;}\n[hidden]{display:none !important;}\n\n/* =========================================================\n   SESSIONS — live agent sessions\n   ========================================================= */\n.q-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border-subtle);\n  border:1px solid var(--border-subtle);border-radius:var(--r-lg);overflo
