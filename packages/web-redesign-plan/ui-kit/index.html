<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forge — Web UI Kit</title>
<link rel="icon" href="../../assets/forge-mark-32.png">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { background: var(--bg-app); font-family: var(--font-sans); color: var(--fg-default);
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  #root { height: 100vh; width: 100vw; overflow: hidden; }
  button { font-family: var(--font-sans); }
  ::-webkit-scrollbar { width: 11px; height: 11px; }
  ::-webkit-scrollbar-thumb { background: var(--paper-300); border-radius: 999px; border: 3px solid var(--bg-app); }
  ::-webkit-scrollbar-thumb:hover { background: var(--paper-400); }

  @keyframes forge-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes forge-slide { from { transform: translateX(24px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes forge-pop { from { transform: translate(-50%,-50%) scale(0.97); opacity: 0; } to { transform: translate(-50%,-50%) scale(1); opacity: 1; } }
  @keyframes forge-drop { from { transform: translateY(-8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .forge-pulse { animation: forge-pulse 1.8s var(--ease-in-out) infinite; }
  @keyframes forge-pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.55; transform: scale(0.82); } }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#FBFAF8"/>
    <circle cx="28" cy="50" r="6" fill="#1F9D6B"/>
    <rect x="34" y="49" width="14" height="2" fill="#1F9D6B"/>
    <circle cx="50" cy="50" r="7" fill="#F15A2B"/>
    <rect x="57" y="49" width="14" height="2" fill="#E4E0D8"/>
    <circle cx="72" cy="50" r="6" fill="#fff" stroke="#E4E0D8" stroke-width="2"/>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Icon.jsx"></script>

<script type="text/babel" src="Shell.jsx"></script>

</body>
</html>
