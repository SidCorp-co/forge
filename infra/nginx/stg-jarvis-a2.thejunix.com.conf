# Reference snapshot of the staging nginx site for stg-jarvis-a2.thejunix.com.
#
# Source of truth lives on the VPS at:
#   root@165.22.96.128:/etc/nginx/sites-enabled/stg-jarvis-a2.thejunix.com
#
# This file is NOT deployed automatically. It is committed for traceability
# and to make ingress problems debuggable from the repo. Whenever the live
# site changes, scp it back into this path and commit.
#
# WebSocket routing notes:
#   * `location /ws` MUST set proxy_http_version 1.1 + Upgrade/Connection
#     headers, otherwise nginx forwards the request as a plain HTTP GET and
#     core's Hono catch-all returns 404 (`{"code":"NOT_FOUND",...}`).
#   * Cloudflare zone `thejunix.com` MUST have Network -> WebSockets ON.
#     If the toggle is OFF, requests reach origin over HTTP/2 with the
#     upgrade headers stripped and core returns the same 404. See
#     ../README.md for the full diagnosis (ISS-238).
#   * 401 from /ws is expected for unauthenticated clients -- the core WS
#     server requires a Bearer token or `forge_auth` cookie on upgrade
#     (see forge/core/src/ws/server.ts and docs/architecture/websocket.md).

server {
    server_name stg-jarvis-a2.thejunix.com;

    location /.well-known/acme-challenge/ { root /var/www/html; }

    location /api/ {
        proxy_pass http://127.0.0.1:19450/api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://127.0.0.1:19450/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering    off;
    }

    location /mcp {
        proxy_pass http://127.0.0.1:19450/mcp;
        proxy_set_header Host $host;
        proxy_read_timeout 600;
    }

    location = /health {
        proxy_pass http://127.0.0.1:19450/health;
    }

    location / {
        proxy_pass http://127.0.0.1:19451;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/stg-jarvis-a2.thejunix.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/stg-jarvis-a2.thejunix.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = stg-jarvis-a2.thejunix.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name stg-jarvis-a2.thejunix.com;
    return 404; # managed by Certbot
}
