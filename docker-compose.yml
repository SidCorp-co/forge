services:
  # === Database (pgvector for embeddings — ADR 0011) ===
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: forge
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forge_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge"]
      interval: 5s
      timeout: 3s
      retries: 5

  # === Core API (Hono + Drizzle — RFC 0002) ===
  core:
    build:
      context: ./forge/core
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "8080"
      DATABASE_URL: postgres://forge:${POSTGRES_PASSWORD:-forge_secret}@postgres:5432/forge
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  # === Web Frontend ===
  web:
    build:
      context: .
      dockerfile: forge/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080/api
    restart: unless-stopped
    depends_on:
      - core
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}

volumes:
  postgres_data:
