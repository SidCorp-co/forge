services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: forge
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge"]
      interval: 5s
      timeout: 3s
      retries: 10
      # Postgres image bootstraps with initdb → create-db → restart sequence
      # that can take 20-30s cold. Without start_period the depends_on
      # condition flips to unhealthy on first deploy and Coolify aborts
      # before the second (real) postgres start finishes.
      start_period: 30s

  # NOTE: configure your reverse proxy (Traefik / nginx / Caddy) to route
  # https://<your-host>/api → core:8080. The web service below expects the
  # same origin and proxies to /api.
  core:
    build:
      context: ./packages/core
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:19450:8080"
    volumes:
      # Comment attachments default to local-fs storage at UPLOADS_DIR
      # (=./uploads = /app/uploads in the container). Without a volume the
      # directory is wiped on every container recreate. Switch to S3 by
      # setting STORAGE_DRIVER=s3 + S3_BUCKET/S3_REGION when ready.
      - core_uploads:/app/uploads
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: "8080"
      DATABASE_URL: postgres://forge:${POSTGRES_PASSWORD}@postgres:5432/forge
      JWT_SECRET: ${JWT_SECRET}
      DEVICE_TOKEN_PEPPER: ${DEVICE_TOKEN_PEPPER}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      # When web + api live on different subdomains of the same registrable
      # domain (e.g. forge-beta.example.com + forge-beta-api.example.com),
      # set AUTH_COOKIE_DOMAIN=.example.com so the auth cookie is shared
      # across both. Without it the cookie stays host-scoped to api.* and
      # the web origin cannot read it → user appears unauthenticated.
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-}
      LITELLM_API_URL: ${LITELLM_API_URL:-}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      LITELLM_MODEL: ${LITELLM_MODEL:-}
      # OAuth/OIDC (ISS-314). Toggle FEATURE_SOCIAL_AUTH=true to expose
      # provider buttons; provider rows are read at request time so you can
      # add/remove providers without restarting once the flag is on.
      FEATURE_SOCIAL_AUTH: ${FEATURE_SOCIAL_AUTH:-false}
      OAUTH_REDIRECT_BASE: ${OAUTH_REDIRECT_BASE:-${APP_BASE_URL}}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      # Google uses full OIDC; env names follow the schema in
      # packages/core/src/config/env.ts (GOOGLE_OIDC_*, not GOOGLE_OAUTH_*).
      GOOGLE_OIDC_CLIENT_ID: ${GOOGLE_OIDC_CLIENT_ID:-}
      GOOGLE_OIDC_CLIENT_SECRET: ${GOOGLE_OIDC_CLIENT_SECRET:-}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      # Comma-separated allow-list of admin emails; gates /api/admin/*.
      # Without it every admin route 403s — set at least one email so a
      # human can reach the admin surface on a fresh deployment.
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      # Embeddings (memory-knowledge module). Empty = disabled; embeddings
      # singleton is lazy and only errors on first semantic-search use.
      EMBEDDINGS_BASE_URL: ${EMBEDDINGS_BASE_URL:-}
      EMBEDDINGS_API_KEY: ${EMBEDDINGS_API_KEY:-}
      EMBEDDINGS_MODEL: ${EMBEDDINGS_MODEL:-}
      EMBEDDINGS_DIM: ${EMBEDDINGS_DIM:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
        NEXT_PUBLIC_ENV_LABEL: ${NEXT_PUBLIC_ENV_LABEL:-}
    restart: unless-stopped
    depends_on:
      - core
    ports:
      - "127.0.0.1:19451:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api}

volumes:
  postgres_data:
  core_uploads:
