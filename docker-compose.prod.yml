services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: forge
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge"]
      interval: 5s
      timeout: 3s
      retries: 5

  # NOTE: ingress/Traefik must route https://jarvis-agent.thejunix.com/api → core:8080.
  # The Strapi cutover (ISS-226) owns that change — confirm it lands with this PR.
  core:
    build:
      context: ./forge/core
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:19450:8080"
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: "8080"
      DATABASE_URL: postgres://forge:${POSTGRES_PASSWORD}@postgres:5432/forge
      JWT_SECRET: ${JWT_SECRET}
      DEVICE_TOKEN_PEPPER: ${DEVICE_TOKEN_PEPPER}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      APP_BASE_URL: ${APP_BASE_URL:-https://jarvis-agent.thejunix.com}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://jarvis-agent.thejunix.com}
      LITELLM_API_URL: ${LITELLM_API_URL:-}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      LITELLM_MODEL: ${LITELLM_MODEL:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: forge/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://jarvis-agent.thejunix.com/api}
    restart: unless-stopped
    depends_on:
      - core
    ports:
      - "127.0.0.1:19451:3000"
    environment:
      NEXT_PUBLIC_API_URL: https://jarvis-agent.thejunix.com/api

volumes:
  postgres_data:
