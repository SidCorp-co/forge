services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: forge
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.2
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

  strapi:
    build:
      context: ./forge/strapi
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:19450:1337"
    environment:
      HOST: 0.0.0.0
      PORT: 1337
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: forge
      DATABASE_USERNAME: forge
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CORS_ORIGINS: https://jarvis-agent.thejunix.com
      QDRANT_URL: http://qdrant:6333
      LITELLM_API_URL: ${LITELLM_API_URL:-}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      LITELLM_MODEL: ${LITELLM_MODEL:-}

  web:
    build:
      context: ./forge/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://jarvis-agent.thejunix.com/api
    restart: unless-stopped
    depends_on:
      - strapi
    ports:
      - "127.0.0.1:19451:3000"
    environment:
      NEXT_PUBLIC_API_URL: https://jarvis-agent.thejunix.com/api

volumes:
  postgres_data:
  qdrant_data:
