name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      dev: ${{ steps.filter.outputs.dev }}
      core: ${{ steps.filter.outputs.core }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # NB: dorny/paths-filter treats `!pattern` entries as separate
          # positive matchers ("match files NOT matching pattern"), not as
          # subtractions from the match set. With the default
          # `predicate-quantifier: some`, a `!**/*.md` line would make a
          # filter match any non-MD file in the diff. Don't use negations
          # here — keep filters as plain positive include lists.
          # forge/app/ is paused (ADR 0009); intentionally not gated.
          filters: |
            web:
              - 'forge/web/**'
              - 'forge/contracts/**'
            dev:
              - 'forge/dev/**'
            core:
              - 'forge/core/**'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - '.github/workflows/ci.yml'
            docs:
              - 'docs/**'
              - '**.md'

  web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - run: pnpm --filter web lint
      - run: pnpm --filter web exec vitest run --passWithNoTests
      - run: pnpm --filter web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080/api

  dev:
    needs: changes
    if: needs.changes.outputs.dev == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: forge/dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: forge/dev/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: forge/dev/src-tauri
      - name: Install Linux deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - run: npx vitest run --passWithNoTests
      # Format/clippy debt — pre-existing drift (cargo fmt + 14 clippy
      # warnings). Tracked for cleanup as a separate ISS. Don't block CI.
      - name: Rust check
        continue-on-error: true
        working-directory: forge/dev/src-tauri
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets -- -D warnings

  # forge/app/ job removed: mobile is paused per ADR 0009 with known
  # type-error drift; no point gating CI on a package no one is meant to
  # touch. Re-add when the app is unpaused.

  core:
    needs: changes
    if: needs.changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: forge/core
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .
      # Lint debt — biome reports many pre-existing errors in core (test files
      # mostly: noExplicitAny, noNonNullAssertion). Tracked for cleanup as a
      # separate ISS. Don't block CI on it for now.
      - run: pnpm --filter @forge/core lint
        continue-on-error: true
      - run: pnpm --filter @forge/core test
      - run: pnpm --filter @forge/core typecheck
      - run: pnpm --filter @forge/core build
      - name: Integration tests (Testcontainers)
        run: pnpm --filter @forge/core test:integration:ci

  docs:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: yes
          config-file: .github/mlc-config.json

  e2e-web:
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: forge_e2e
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/forge_e2e
      JWT_SECRET: e2e-jwt-secret-at-least-32-characters-long
      DEVICE_TOKEN_PEPPER: e2e-device-pepper-at-least-32-characters-long
      SMTP_HOST: localhost
      SMTP_PORT: "2525"
      SMTP_USER: e2e
      SMTP_PASS: e2e
      SMTP_FROM: e2e@test.local
      APP_BASE_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
      NODE_ENV: test
      NEXT_PUBLIC_API_URL: /api
      E2E_CORE_PROXY_URL: http://localhost:8080
      E2E_WEB_URL: http://localhost:3000
      E2E_CORE_API_URL: http://localhost:8080/api
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Apply Drizzle migrations
        run: pnpm --filter @forge/core db:migrate
      - name: Build core
        run: pnpm --filter @forge/core build
      - name: Start core
        # Scope PORT to this step only — Playwright's webServer spawns Next.js
        # which inherits process env, and Next reads PORT. With a job-level
        # PORT=8080, Next would try to bind core's port and EADDRINUSE.
        env:
          PORT: "8080"
        run: pnpm --filter @forge/core start &
      - name: Wait for core health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null; then exit 0; fi
            sleep 2
          done
          echo "core did not become healthy" && exit 1
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium
      - name: Build web
        run: pnpm --filter web build
      - name: Run Playwright
        run: pnpm --filter web exec playwright test
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: forge/web/playwright-report
