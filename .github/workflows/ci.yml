name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      dev: ${{ steps.filter.outputs.dev }}
      app: ${{ steps.filter.outputs.app }}
      core: ${{ steps.filter.outputs.core }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'forge/web/**'
            dev:
              - 'forge/dev/**'
            app:
              - 'forge/app/**'
            core:
              - 'forge/core/**'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - '.github/workflows/ci.yml'
            docs:
              - 'docs/**'
              - '**.md'

  web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: forge/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: forge/web/package-lock.json
      - run: npm ci
      - run: npm run lint --if-present
      - run: npx vitest run --passWithNoTests
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080/api

  dev:
    needs: changes
    if: needs.changes.outputs.dev == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: forge/dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: forge/dev/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: forge/dev/src-tauri
      - name: Install Linux deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - run: npx vitest run --passWithNoTests
      - name: Rust check
        working-directory: forge/dev/src-tauri
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets -- -D warnings

  app:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: forge/app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: forge/app/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  core:
    needs: changes
    if: needs.changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: forge/core
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .
      - run: pnpm --filter @forge/core lint
      - run: pnpm --filter @forge/core test
      - run: pnpm --filter @forge/core typecheck
      - run: pnpm --filter @forge/core build
      - name: Integration tests (Testcontainers)
        run: pnpm --filter @forge/core test:integration:ci

  docs:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: yes
          config-file: .github/mlc-config.json

  e2e-web:
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: forge_e2e
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/forge_e2e
      JWT_SECRET: e2e-jwt-secret-at-least-32-characters-long
      DEVICE_TOKEN_PEPPER: e2e-device-pepper-at-least-32-characters-long
      SMTP_HOST: localhost
      SMTP_PORT: "2525"
      SMTP_USER: e2e
      SMTP_PASS: e2e
      SMTP_FROM: e2e@test.local
      APP_BASE_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
      PORT: "8080"
      NODE_ENV: test
      NEXT_PUBLIC_API_URL: /api
      E2E_CORE_PROXY_URL: http://localhost:8080
      E2E_WEB_URL: http://localhost:3000
      E2E_CORE_API_URL: http://localhost:8080/api
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Apply Drizzle migrations
        run: pnpm --filter @forge/core db:migrate
      - name: Build core
        run: pnpm --filter @forge/core build
      - name: Start core
        run: pnpm --filter @forge/core start &
      - name: Wait for core health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null; then exit 0; fi
            sleep 2
          done
          echo "core did not become healthy" && exit 1
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium
      - name: Build web
        run: pnpm --filter web build
      - name: Run Playwright
        run: pnpm --filter web exec playwright test
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: forge/web/playwright-report
