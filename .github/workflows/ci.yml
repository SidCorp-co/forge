name: CI

# This repo is a pnpm workspace. CI contract:
#   1. ALL jobs that touch a workspace package call the composite action
#      `.github/actions/setup-workspace` for checkout-aware pnpm + Node 22 +
#      frozen-lockfile install. Do NOT add per-job pnpm/setup-node/install
#      steps — the composite is the single source of truth.
#   2. Run commands from the repo root using `pnpm --filter <pkg>`. Do NOT
#      set `defaults.working-directory` — that pattern blocks workspace
#      filters and was the root cause of the npm/pnpm drift in the old
#      `dev` job.
#   3. There is NO per-package package-lock.json. The only lockfile is the
#      root `pnpm-lock.yaml`.
#   4. The `install-check` job runs on every PR with no `if` gate — it
#      catches lockfile/install drift even when no package-specific job
#      fires. If you find yourself disabling it, you're papering over real
#      drift; fix the lockfile instead.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Dependabot PRs run with a read-only GITHUB_TOKEN by default (since
# Sept 2021), which makes dorny/paths-filter's pulls.listFiles API call
# fail with "Resource not accessible by integration". Declaring read
# scopes explicitly fixes Dependabot PRs without changing behavior for
# pushes or human PRs.
permissions:
  contents: read
  pull-requests: read

jobs:
  # Always-on guardrail: catches lockfile drift, missing package.json
  # entries, and workspace misconfiguration on every PR — including PRs
  # that wouldn't trigger any package-specific job. Cheap (~30s warm,
  # ~90s cold) and high signal: if this fails, every other job would
  # fail too once a path filter happens to match.
  install-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
        with:
          prebuild-observability: "false"

  # English-only source policy (ISS-65). Runs scripts/check-source-language.mjs
  # in --all mode. Always-on, ungated by paths-filter — language drift can land
  # via any change set. Cheap (~15s); zero-dep script, no pnpm install needed.
  lang-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node scripts/check-source-language.mjs --all

  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      dev: ${{ steps.filter.outputs.dev }}
      dev-tauri: ${{ steps.filter.outputs.dev-tauri }}
      core: ${{ steps.filter.outputs.core }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # NB: dorny/paths-filter treats `!pattern` entries as separate
          # positive matchers ("match files NOT matching pattern"), not as
          # subtractions from the match set. With the default
          # `predicate-quantifier: some`, a `!**/*.md` line would make a
          # filter match any non-MD file in the diff. Don't use negations
          # here — keep filters as plain positive include lists.
          # packages/app/ is paused (ADR 0009); intentionally not gated.
          filters: |
            web:
              - 'packages/web/**'
              - 'packages/contracts/**'
            dev:
              - 'packages/dev/**'
            dev-tauri:
              - 'packages/dev/src-tauri/**'
              - '.github/workflows/release.yml'
            core:
              - 'packages/core/**'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - '.github/workflows/ci.yml'
            docs:
              - 'docs/**'
              - '**.md'

  web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
      # Lint debt — eslint-plugin-react-compiler flags pre-existing
      # patterns (setState in effects, impure-during-render) across landing
      # + protected pages. Tracked for cleanup; don't block CI.
      - run: pnpm --filter web lint
        continue-on-error: true
      - run: pnpm --filter web exec vitest run --passWithNoTests
      - run: pnpm --filter web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080/api

  dev:
    needs: changes
    if: needs.changes.outputs.dev == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/dev/src-tauri
      - name: Install Linux deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: pnpm --filter forge-beta exec vitest run --passWithNoTests
      # Format/clippy debt — pre-existing drift (cargo fmt + 14 clippy
      # warnings). Tracked for cleanup as a separate ISS. Don't block CI.
      - name: Rust check
        continue-on-error: true
        working-directory: packages/dev/src-tauri
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets -- -D warnings

  # Smoke-build a Tauri bundle on Linux (deb only) when src-tauri config or
  # the release workflow changes. Catches regressions in tauri.conf.json
  # (e.g. bundle.active flipped to false, broken icon paths, invalid target
  # list) BEFORE they reach a release tag. Without this guard, every release
  # v0.1.9..v0.1.16 silently produced binary-only builds with zero installer
  # artifacts attached.
  dev-bundle-smoke:
    needs: changes
    if: needs.changes.outputs.dev-tauri == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate bundle.active=true
        run: |
          jq -e '.bundle.active == true' packages/dev/src-tauri/tauri.conf.json \
            || { echo "::error file=packages/dev/src-tauri/tauri.conf.json::bundle.active must be true (release builds skip bundling otherwise)"; exit 1; }
      - uses: ./.github/actions/setup-workspace
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/dev/src-tauri
      - name: Install Linux deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Generate throwaway updater signing key
        # tauri-cli aborts with "public key found, but no private key" when
        # tauri.conf.json declares an updater pubkey. Generate a smoke-only
        # keypair so the build step can sign artifacts; the throwaway key
        # never leaves CI and is unrelated to release-signing secrets.
        run: |
          pnpm --filter forge-beta exec tauri signer generate -p "" -w /tmp/smoke.key
          echo "TAURI_SIGNING_PRIVATE_KEY=$(cat /tmp/smoke.key)" >> "$GITHUB_ENV"
          echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=" >> "$GITHUB_ENV"
      - name: Build (deb only)
        working-directory: packages/dev
        run: pnpm tauri build --bundles deb
      - name: Verify .deb produced
        run: |
          if ! ls "packages/dev/src-tauri/target/release/bundle/deb/"*.deb >/dev/null 2>&1; then
            echo "::error::Tauri bundler did not produce a .deb under target/release/bundle/deb/"
            exit 1
          fi

  # packages/app/ job removed: mobile is paused per ADR 0009 with known
  # type-error drift; no point gating CI on a package no one is meant to
  # touch. Re-add when the app is unpaused.

  core:
    needs: changes
    if: needs.changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
      # Lint debt — biome reports many pre-existing errors in core (test files
      # mostly: noExplicitAny, noNonNullAssertion). Tracked for cleanup as a
      # separate ISS. Don't block CI on it for now.
      - run: pnpm --filter @forge/core lint
        continue-on-error: true
      - run: pnpm --filter @forge/core test
      # `typecheck` uses base tsconfig that includes test files; weakly-typed
      # mock accesses (publishSpy.mock.calls[0]) fail tsc. Build uses
      # tsconfig.build.json which excludes tests, so prod compile is clean.
      # Same cleanup ISS as the lint debt.
      - run: pnpm --filter @forge/core typecheck
        continue-on-error: true
      - run: pnpm --filter @forge/core build
      # Integration tests (Testcontainers) intentionally not in CI — heavy,
      # slow, and currently has flake. Maintainer runs locally before
      # release: `pnpm --filter @forge/core test:integration:ci`.

  docs:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: yes
          config-file: .github/mlc-config.json

  # e2e-web removed for v0.1 alpha. Browser e2e was brittle on a
  # single-spec happy-path; cost > value at this stage. Reinstate when the
  # surface stabilises and there's a reason to gate PRs on UI flows.
