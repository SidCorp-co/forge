name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # Release gate — recheck the tagged commit before creating the release or
  # spending 4 platform builds. Mirrors the blocking part of CI's `dev` job
  # (renderer tests); the Tauri compile itself is validated by the build
  # matrix below. A tag is immutable: never ship from a red commit.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-workspace
      - run: pnpm --filter forge-beta exec vitest run --passWithNoTests

  release:
    needs: check
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found = 1
              next
            }
            found { print }
          ' CHANGELOG.md > /tmp/release_notes.md
          if [ ! -s /tmp/release_notes.md ]; then
            echo "No changelog entry for $VERSION — using auto-generated notes." > /tmp/release_notes.md
          fi

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: /tmp/release_notes.md
          generate_release_notes: true
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}

  # Build Forge Beta (Tauri) artifacts on each platform and attach to the
  # release. Tauri's updater plugin resolves
  # https://github.com/SidCorp-co/forge/releases/latest/download/latest.json
  # which tauri-action generates with platform→download-URL mappings + signatures.
  #
  # Repo secrets (Settings → Secrets and variables → Actions):
  #
  # Required (always — updater signing):
  #   TAURI_SIGNING_PRIVATE_KEY           output of `pnpm tauri signer generate`
  #   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  passphrase chosen at generate time
  #     The matching public key lives at packages/dev/src-tauri/tauri.conf.json:pubkey.
  #
  # Optional code-signing secrets — currently NOT wired into the env block
  # below because GitHub Actions interpolates a missing secret as "" (not
  # unset) and Tauri treats an empty APPLE_CERTIFICATE / WINDOWS_CERTIFICATE
  # as "import this cert" → aborts. When real certs become available, add
  # both the secret AND the matching env: line in the build step.
  #
  #   APPLE_CERTIFICATE                   base64-encoded .p12 (Developer ID Application)
  #   APPLE_CERTIFICATE_PASSWORD          .p12 password
  #   APPLE_SIGNING_IDENTITY              e.g. "Developer ID Application: Acme Inc (TEAMID)"
  #   APPLE_ID                            Apple ID email
  #   APPLE_PASSWORD                      app-specific password (appleid.apple.com → Sign-In and Security)
  #   APPLE_TEAM_ID                       Team ID from developer.apple.com
  #   WINDOWS_CERTIFICATE                 base64-encoded .pfx
  #   WINDOWS_CERTIFICATE_PASSWORD        .pfx password
  #
  # See docs/guides/release.md for the full setup playbook.
  build:
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      # Windows runners ship `credential.helper=manager` which intercepts the
      # AUTHORIZATION header `actions/checkout` injects and falls back to an
      # interactive prompt — the v0.2.0 build failed `fetch tag` 3× with
      # `could not read Username for https://github.com`. Disabling the
      # helper for this job lets the header through unchallenged.
      - name: Disable Windows credential helper
        if: matrix.platform == 'windows-latest'
        run: git config --global credential.helper ""
        shell: bash

      - uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/dev/src-tauri

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JS deps (workspace)
        run: pnpm install --frozen-lockfile

      - name: Prebuild emit-only workspace deps
        # @forge/observability ships compiled JS — the renderer imports it as
        # `@forge/observability` and Node 22 refuses to load .ts under
        # node_modules. Mirrors the pre-push hook's prebuild step so fresh CI
        # checkouts compile the dist/ before tauri-action invokes vite.
        run: pnpm --filter @forge/observability build

      - name: Build + sign + upload Tauri artifacts
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signing (required — used to sign the .sig files
          # that the auto-updater verifies against tauri.conf.json:pubkey).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          #
          # NB: APPLE_* and WINDOWS_* code-signing env vars are intentionally
          # NOT set here. GitHub Actions interpolates a missing secret as the
          # empty string (not "unset"); Tauri's macOS bundler treats a present-
          # but-empty APPLE_CERTIFICATE as "try to import" and aborts with
          # `failed to run command security import`. Same shape on Windows.
          # Re-add these env entries (and the matching secrets) when we
          # actually have certificates — until then, omitting them yields
          # unsigned builds that still ship artifacts.
          #
          # Sentry DSNs (opt-in telemetry — official release artifacts only).
          # Both env vars are read at build time:
          #   VITE_SENTRY_DSN          → @sentry/react in packages/dev (renderer)
          #   FORGE_SENTRY_DSN_RUST    → option_env!() in src-tauri/main.rs (Rust)
          # Source builds without these secrets compile cleanly with Sentry
          # disabled — contributors never silently report to the maintainer.
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN_FORGE_DEV }}
          FORGE_SENTRY_DSN_RUST: ${{ secrets.SENTRY_DSN_FORGE_DEV_RUST }}
          # Default production API origin baked into the build so first-launch
          # users don't have to type the URL on the login screen. Read by:
          #   VITE_DEFAULT_CORE_URL    → packages/dev/src (renderer fallback)
          #   FORGE_DEFAULT_CORE_URL   → option_env!() in src-tauri/config/mod.rs
          # Source builds (no variable set) fall back to localhost defaults.
          VITE_DEFAULT_CORE_URL: ${{ vars.FORGE_DEFAULT_CORE_URL }}
          FORGE_DEFAULT_CORE_URL: ${{ vars.FORGE_DEFAULT_CORE_URL }}
        with:
          projectPath: packages/dev
          tauriScript: pnpm tauri
          releaseId: ${{ needs.release.outputs.release_id }}
          args: ${{ matrix.args }}
          includeUpdaterJson: true

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Mark release as non-draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "$GITHUB_REF_NAME" --draft=false --repo "$GITHUB_REPOSITORY"
