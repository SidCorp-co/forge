name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found = 1
              next
            }
            found { print }
          ' CHANGELOG.md > /tmp/release_notes.md
          if [ ! -s /tmp/release_notes.md ]; then
            echo "No changelog entry for $VERSION — using auto-generated notes." > /tmp/release_notes.md
          fi

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: /tmp/release_notes.md
          generate_release_notes: true
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}

  # Build Forge Beta (Tauri) artifacts on each platform and attach to the
  # release. Tauri's updater plugin resolves
  # https://github.com/junixlabs/jarvis-agents/releases/latest/download/latest.json
  # which tauri-action generates with platform→download-URL mappings + signatures.
  #
  # Repo secrets (Settings → Secrets and variables → Actions):
  #
  # Required (always — updater signing):
  #   TAURI_SIGNING_PRIVATE_KEY           output of `pnpm tauri signer generate`
  #   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  passphrase chosen at generate time
  #     The matching public key lives at packages/dev/src-tauri/tauri.conf.json:pubkey.
  #
  # Optional (macOS code signing + notarization — leave unset for unsigned builds):
  #   APPLE_CERTIFICATE                   base64-encoded .p12 (Developer ID Application)
  #   APPLE_CERTIFICATE_PASSWORD          .p12 password
  #   APPLE_SIGNING_IDENTITY              e.g. "Developer ID Application: Acme Inc (TEAMID)"
  #   APPLE_ID                            Apple ID email
  #   APPLE_PASSWORD                      app-specific password (appleid.apple.com → Sign-In and Security)
  #   APPLE_TEAM_ID                       Team ID from developer.apple.com
  #
  # Optional (Windows code signing — leave unset for unsigned builds):
  #   WINDOWS_CERTIFICATE                 base64-encoded .pfx
  #   WINDOWS_CERTIFICATE_PASSWORD        .pfx password
  #
  # See docs/guides/release.md for the full setup playbook.
  build:
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/dev/src-tauri

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JS deps (workspace)
        run: pnpm install --frozen-lockfile

      - name: Build + sign + upload Tauri artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signing (required).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing + notarization (optional — empty means unsigned build).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows code signing (optional — empty means unsigned build).
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          projectPath: packages/dev
          releaseId: ${{ needs.release.outputs.release_id }}
          args: ${{ matrix.args }}
          includeUpdaterJson: true

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Mark release as non-draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "$GITHUB_REF_NAME" --draft=false --repo "$GITHUB_REPOSITORY"
