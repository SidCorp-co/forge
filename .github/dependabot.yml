version: 2
updates:
  - package-ecosystem: "github-actions"
    # "/" only scans .github/workflows — composite actions must list their
    # own directory or their `uses:` pins silently rot (setup-workspace sat
    # on deprecated node20 actions for months with zero dependabot PRs).
    directories:
      - "/"
      - "/.github/actions/setup-workspace"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "ci"]
    groups:
      # Actions bumps are almost always runtime-only (nodeXX) — one PR per
      # round beats 4-5 singletons; majors still require manual review via
      # the dependabot-auto-merge policy.
      actions-minor-and-patch:
        update-types: ["minor", "patch"]
      actions-majors:
        update-types: ["major"]

  # npm ecosystem — explicitly list workspace package.json paths. Root
  # package.json owns turbo + pnpm config; the other entries are pnpm
  # workspace members. minor+patch are grouped to keep PR volume sane;
  # majors land as individual PRs for review.
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/packages/contracts"
      - "/packages/core"
      - "/packages/dev"
      - "/packages/web-v2"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
      # Majors grouped into ONE PR per round: the pnpm workspace has a single
      # lockfile, so per-directory major PRs (typescript ×4, vitest ×4, …)
      # all collide on pnpm-lock.yaml — merging one conflicted the rest. One
      # grouped PR = one review + one lockfile resolution. Auto-merge still
      # skips majors (dependabot-auto-merge.yml flags them deps:needs-review).
      majors:
        update-types: ["major"]

  # Cargo for the Tauri desktop app's Rust backend. packages/dev/src-tauri/
  # is the only Cargo project; packages/core/ and packages/web-v2/ are pure TS.
  - package-ecosystem: "cargo"
    directory: "/packages/dev/src-tauri/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "rust"]
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  # Stubs kept commented for future ecosystems; uncomment if/when adopted.

