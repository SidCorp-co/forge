version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "ci"]

  # npm ecosystem — explicitly list workspace package.json paths so we can
  # exclude forge/app/ (paused per ADR 0009 — bumping its deps now would
  # silently rot the package and surface as a big-bang upgrade when the
  # mobile app unpauses). Root package.json owns turbo + pnpm config; the
  # other entries are pnpm workspace members. minor+patch are grouped to
  # keep PR volume sane; majors land as individual PRs for review.
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/forge/contracts"
      - "/forge/core"
      - "/forge/dev"
      - "/forge/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels: ["dependencies"]
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  # Cargo for the Tauri desktop app's Rust backend. forge/dev/src-tauri/
  # is the only Cargo project; forge/core/, forge/web/, forge/app/ are
  # pure TS.
  - package-ecosystem: "cargo"
    directory: "/forge/dev/src-tauri/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "rust"]
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  # Stubs kept commented for future ecosystems; uncomment if/when adopted.

