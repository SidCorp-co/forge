version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "ci"]

  # npm ecosystem — explicitly list workspace package.json paths. Root
  # package.json owns turbo + pnpm config; the other entries are pnpm
  # workspace members. minor+patch are grouped to keep PR volume sane;
  # majors land as individual PRs for review.
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/packages/contracts"
      - "/packages/core"
      - "/packages/dev"
      - "/packages/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  # Cargo for the Tauri desktop app's Rust backend. packages/dev/src-tauri/
  # is the only Cargo project; packages/core/ and packages/web/ are pure TS.
  - package-ecosystem: "cargo"
    directory: "/packages/dev/src-tauri/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "rust"]
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  # Stubs kept commented for future ecosystems; uncomment if/when adopted.

