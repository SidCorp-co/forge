name: Bug Report
description: Report a bug to help the project improve
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. The more detail, the faster we can fix it.

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What is the bug? When does it happen?
      placeholder: When I click X, Y happens instead of Z
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Concrete steps that trigger the bug
      placeholder: |
        1. Run `...`
        2. Open `...`
        3. See error `...`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v0.1.2 or commit SHA
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Linux
        - macOS
        - Windows
        - Docker
        - Other (describe below)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      render: shell
