name: Feature Request
description: Suggest a new feature
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the **problem** first, not the solution. Maintainers may suggest a better approach.

  - type: textarea
    id: problem
    attributes:
      label: Problem you are facing
      description: What are you trying to do that is hard or impossible today?
      placeholder: I want to do X, but currently I have to do Y because Z is missing
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution (optional)
      description: If you have a specific idea, describe it here. Not required.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Current workarounds or other tools you have tried

  - type: dropdown
    id: impact
    attributes:
      label: Impact on you
      options:
        - Nice to have
        - Blocks my workflow
        - Blocker — unusable without it
    validations:
      required: true
