name: Feature Request
description: Đề xuất feature mới
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Mô tả **vấn đề** trước, đừng mô tả **giải pháp** ngay. Maintainer có thể đề xuất giải pháp khác tốt hơn.

  - type: textarea
    id: problem
    attributes:
      label: Vấn đề bạn đang gặp
      description: Bạn đang muốn làm gì mà hiện tại không làm được / khó làm?
      placeholder: Tôi muốn X nhưng hiện tại phải Y vì thiếu Z
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Giải pháp bạn nghĩ đến (tùy chọn)
      description: Nếu có idea cụ thể, mô tả ở đây. Không bắt buộc.

  - type: textarea
    id: alternatives
    attributes:
      label: Giải pháp thay thế đã cân nhắc
      description: Workaround hiện tại / tools khác đã thử

  - type: dropdown
    id: impact
    attributes:
      label: Mức độ ảnh hưởng đến bạn
      options:
        - Nice to have
        - Cản trở workflow
        - Blocker — không dùng được nếu thiếu
    validations:
      required: true
